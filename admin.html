<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head><meta charset="UTF-8">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiteSight | الرئيسية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Outfit:wght@400;600;700&family=Alexandria:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=v11_fixed" />
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--glass-border);
    }
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }
    .admin-stat-card {
      background: var(--bg-card);
      padding: 20px;
      border-radius: var(--radius-md);
      border: 1px solid var(--glass-border);
      text-align: center;
    }
    .admin-stat-card h3 {
      font-size: 36px;
      color: var(--primary);
      margin: 10px 0;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }
    .data-table th, .data-table td {
      padding: 12px 15px;
      text-align: right;
      border-bottom: 1px solid var(--glass-border);
    }
    .data-table th {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
    }
    .action-btn {
      padding: 5px 10px;
      font-size: 12px;
      background: #ff4d4d;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .add-form-container {
      background: var(--bg-card);
      padding: 20px;
      border-radius: var(--radius-md);
      border: 1px solid var(--glass-border);
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="logo" href="home.html">
        <span class="logo-badge">🛡️</span>
        <div>
          <h1>الإدارة</h1>
          <p>لوحة التحكم بالوصفات والمستخدمين</p>
        </div>
      </a>
      <nav class="nav">
        <a href="home.html" data-i18n="nav.home">الرئيسية</a>
      </nav>
    </header>

    <main class="admin-container section">
      <div class="admin-header">
        <h2>نظرة عامة</h2>
      </div>

      <div class="admin-grid">
        <div class="admin-stat-card">
          <p>المستخدمين المسجلين</p>
          <h3 id="usersCount">0</h3>
        </div>
        <div class="admin-stat-card">
          <p>الوصفات المتاحة</p>
          <h3 id="recipesCount">0</h3>
        </div>
        <div class="admin-stat-card">
          <p>المكونات</p>
          <h3 id="ingredientsCount">0</h3>
        </div>
      </div>

      <div class="section-head" style="text-align: right;">
        <h3>الوصفات الموجودة بالنظام</h3>
      </div>
      <div style="overflow-x: auto;">
        <table class="data-table" id="recipesTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>اسم الوصفة</th>
              <th>الوقت</th>
              <th>الصعوبة</th>
              <th>إجراء</th>
            </tr>
          </thead>
          <tbody>
            <!-- Recipes will be loaded here -->
          </tbody>
        </table>
      </div>

      <hr style="margin: 40px 0; border: none; border-bottom: 1px solid var(--glass-border);">

      <div class="section-head text-center">
        <h3>إضافة وصفة جديدة</h3>
      </div>
      
      <div class="add-form-container">
        <form id="addRecipeForm" class="auth-form" style="margin:0;">
          <div class="form-group">
            <label>اسم الوصفة</label>
            <div class="input-wrapper">
              <input type="text" id="r_name" required>
            </div>
          </div>
          <div class="form-group">
            <label>الوقت (مثال: 15 دقيقة)</label>
            <div class="input-wrapper">
              <input type="text" id="r_time" required>
            </div>
          </div>
          <div class="form-group row-group">
            <div style="flex:1;">
               <label>الصعوبة</label>
               <div class="input-wrapper"><input type="text" id="r_diff" placeholder="سهل"></div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="margin-top:20px; width:100%;">إضافة الوصفة</button>
        </form>
      </div>

    </main>
  </div>

  <script src="script.js?v=v11_fixed"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await loadAdminData();

      document.getElementById('addRecipeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const obj = {
          name: document.getElementById('r_name').value,
          time: document.getElementById('r_time').value,
          difficulty: document.getElementById('r_diff').value || 'سهل'
        };

        try {
          const res = await fetch('api.php?action=add_recipe', {
            method: 'POST', body: JSON.stringify(obj)
          });
          const result = await res.json();
          if (result.success) {
            alert("تم إضافة الوصفة.");
            loadAdminData();
            document.getElementById('addRecipeForm').reset();
          } else {
            alert(result.error);
          }
        } catch(err) {}
      });
    });

    async function loadAdminData() {
      try {
        const uRes = await fetch('api.php?action=get_users');
        const users = await uRes.json();
        document.getElementById('usersCount').innerText = users.length || 0;

        const rRes = await fetch('api.php?action=get_recipes');
        const recipesList = await rRes.json();
        document.getElementById('recipesCount').innerText = recipesList.length || 0;

        const iRes = await fetch('api.php?action=get_ingredients');
        const ings = await iRes.json();
        document.getElementById('ingredientsCount').innerText = ings.length || 0;

        const tbody = document.querySelector('#recipesTable tbody');
        if(recipesList && recipesList.length) {
          tbody.innerHTML = recipesList.map(r => `
            <tr>
              <td>${r.id}</td>
              <td>${r.title || r.name}</td>
              <td>${r.time}</td>
              <td>${r.level || r.difficulty}</td>
              <td><button class="action-btn" onclick="deleteRecipe(${r.id})">حذف</button></td>
            </tr>
          `).join("");
        } else {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">لا توجد وصفات</td></tr>';
        }
      } catch (error) {
        console.error(error);
      }
    }

    async function deleteRecipe(id) {
      if(!confirm("هل أنت متأكد من حذف الوصفة؟")) return;
      try {
        const res = await fetch('api.php?action=delete_recipe', {
          method: 'POST', body: JSON.stringify({id})
        });
        const result = await res.json();
        if(result.success) {
          loadAdminData();
        } else {
          alert(result.error);
        }
      } catch(err) {
        console.error(err);
      }
    }
  </script>
</body>
</html>
