<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiteSight | تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Outfit:wght@400;600;700&family=Alexandria:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=p6" />
</head>

<body class="auth-page">
  <div class="page-shell">
    <main>
      <div class="auth-container">
        <div class="auth-card">
          <div class="brand-header">
            <div class="brand-logo">🍽️</div>
            <h1 class="brand-name">Bite<span>Sight</span></h1>
          </div>

          <form class="auth-form" id="loginForm">
            <div class="form-group">
              <label for="email" data-i18n="login.email">البريد الإلكتروني</label>
              <div class="input-wrapper">
                <input type="email" id="email" data-i18n="placeholder.email" placeholder="example@mail.com" required>
              </div>
            </div>

            <div class="form-group">
              <div class="form-group-header">
                <label for="password" data-i18n="login.password">كلمة المرور</label>
                <a href="#" class="small-link" data-i18n="login.forgot">نسيتي كلمة المرور؟</a>
              </div>
              <div class="input-wrapper">
                <input type="password" id="password" data-i18n="placeholder.password" placeholder="••••••••" required>
              </div>
            </div>

            <div class="auth-actions">
              <button type="submit" class="btn btn-primary auth-btn" data-i18n="login.btn">دخول</button>
            </div>
          </form>

          <div class="auth-footer">
            <span data-i18n="login.noacc">ماعندكيش حساب؟</span>
            <a href="signup.html" data-i18n="login.signup">اشتركي الآن</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js?v=p6"></script>
</body>

</html>
