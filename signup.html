<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteSight | إنشاء حساب</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Outfit:wght@400;600;700&family=Alexandria:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=v21" /><link rel="stylesheet" href="auth.css?v=v21">
    <script>
        if (localStorage.getItem("theme") === "light") {
            document.documentElement.setAttribute("data-theme", "light");
        }
    </script>
</head>
<body class="auth-page">
    <div class="auth-theme-toggle">
        <button id="themeToggle" class="theme-btn-float">☀️</button>
    </div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-header">
                <div class="brand-logo">🍳</div>
                <h1 class="brand-name">Bite<span>Sight</span></h1>
            </div>

            <form class="auth-form" id="signupForm">
                <div class="form-group">
                    <label for="fullName">الاسم الكامل</label>
                    <div class="input-wrapper">
                        <input type="text" id="fullName" placeholder="الاسم الكامل" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="example@mail.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">تأكيد كلمة المرور</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 10px; text-align: right;">
                    <input type="checkbox" id="terms" required style="width: 18px; height: 18px; accent-color: var(--primary);">
                    <label for="terms" style="margin-bottom: 0; font-size: 14px; color: var(--text-main);">أوافق على الشروط والأحكام</label>
                </div>

                <button type="submit" class="auth-btn">إنشاء حساب</button>
            </form>

            <div class="auth-footer">
                <span>لديكِ حساب بالفعل؟</span>
                <a href="index.html">سجلي دخولك</a>
            </div>
        </div>
    </div>

    <script src="script.js?v=v20"></script>
    <script src="auth.js?v=v20"></script>
</body>
</html>
