<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head><meta charset="UTF-8">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiteSight | الرئيسية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Outfit:wght@400;600;700&family=Alexandria:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=v11_fixed" />
</head>

<body class="auth-page">
  <div class="page-shell">
    <main>
      <div class="auth-container">
        <div class="auth-card">
          <div class="brand-header">
            <div class="brand-logo">🍽️</div>
            <h1 class="brand-name">Bite<span>Sight</span></h1>
            <div class="lang-hub-auth" style="display: flex; justify-content: center; margin-bottom: 20px;">
              <button id="langToggle" title="Switch Language" class="btn btn-secondary" style="width: auto; padding: 5px 15px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: var(--text-main);">
                <span class="lang-icon">🌐</span>
                <span class="lang-label">EN</span>
              </button>
            </div>
            <p class="brand-subtitle" data-i18n="forgot.subtitle" style="text-align: center; color: var(--text-muted); font-weight: 600;">استعادة كلمة المرور</p>
          </div>

          <form class="auth-form" id="forgotPasswordForm">
            <div class="form-group">
              <label for="resetEmail" data-i18n="login.email">البريد الإلكتروني</label>
              <div class="input-wrapper">
                <input type="email" id="resetEmail" data-i18n="placeholder.email" placeholder="example@mail.com" required>
              </div>
            </div>

            <div class="form-group">
              <label for="resetNewPassword" data-i18n="profile.label.new_pass">كلمة المرور الجديدة</label>
              <div class="input-wrapper">
                <input type="password" id="resetNewPassword" data-i18n="placeholder.password" placeholder="••••••••" required>
                <button type="button" class="password-toggle" onclick="togglePassword('resetNewPassword', this)" title="عرض/إخفاء كلمة المرور">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <div class="auth-actions">
              <button type="submit" class="btn btn-primary auth-btn" data-i18n="forgot.btn">تحديث كلمة المرور</button>
            </div>
          </form>

          <div class="auth-footer">
            <span data-i18n="forgot.remembered">تذكرت كلمة المرور؟</span>
            <a href="index.html" data-i18n="signup.login">سجلي دخولك</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js?v=v11_fixed"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("forgotPasswordForm");
      if (form) {
        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("resetEmail").value;
          const newPass = document.getElementById("resetNewPassword").value;
          
          if (!email || !newPass) return;
          
          try {
            const response = await fetch('api.php?action=reset_password', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: email, new_password: newPass })
            });
            const result = await response.json();
            if (result.success) {
              alert(getCurrentLang() === 'ar' المكونات "تم تحديث كلمة المرور بنجاح، يمكنك الآن تسجيل الدخول." : "Password updated successfully, you can now log in.");
              window.location.href = "index.html";
            } else {
              alert(result.error);
            }
          } catch (err) {
            alert("Connection error.");
          }
        });
      }
    });
  </script>
</body>
</html>
